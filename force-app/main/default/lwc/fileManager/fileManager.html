<template>
    <lightning-card title="File Manager" icon-name="standard:file">
        <lightning-button label="Manage Files" variant="brand" onclick={openModal} slot="actions"></lightning-button>
    </lightning-card>

    <template if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" onclick={closeModal} alternative-text="Close" variant="bare-inverse" class="slds-modal__close"></lightning-button-icon>
                    <h2 class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium" style="min-height: 300px;">
                    
                    <template if:false={isSelectingExisting}>
                        <div class="slds-grid slds-gutters slds-m-bottom_large">
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-file-upload
                                    label="1. Upload from Computer"
                                    name="fileUploader"
                                    accept={acceptedFormats}
                                    onuploadfinished={handleUploadFinished}
                                    multiple>
                                </lightning-file-upload>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-2 slds-p-top_large">
                                <lightning-button 
                                    label="2. Select Existing Files from Org" 
                                    icon-name="utility:search" 
                                    onclick={openExistingFilesView}
                                    class="slds-m-top_x-small">
                                </lightning-button>
                            </div>
                        </div>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_small">Files Ready to be Attached ({selectedFiles.length}):</h3>
                            <div class="slds-list_horizontal slds-wrap" style="gap: 8px;">
                                <template for:each={selectedFiles} for:item="file">
                                    <lightning-pill 
                                        key={file.Id} 
                                        label={file.Title} 
                                        name={file.Id} 
                                        onremove={handleRemovePill}>
                                        <lightning-icon icon-name="doctype:attachment" slot="media"></lightning-icon>
                                    </lightning-pill>
                                </template>
                                <template if:false={selectedFiles.length}>
                                    <p class="slds-text-color_weak">No files selected yet.</p>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template if:true={isSelectingExisting}>
                        <div style="height: 300px;">
                            <lightning-datatable
                                key-field="Id"
                                data={existingFilesData}
                                columns={columns}
                                selected-rows={preSelectedRowIds}
                                onrowselection={handleRowSelection}>
                            </lightning-datatable>
                        </div>
                    </template>

                </div>

                <footer class="slds-modal__footer">
                    <template if:false={isSelectingExisting}>
                        <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Finalize Uploads" variant="brand" onclick={handleFinalUpload} disabled={isUploadDisabled}></lightning-button>
                    </template>
                    
                    <template if:true={isSelectingExisting}>
                        <lightning-button label="Back" onclick={closeExistingFilesView} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Confirm Selection" variant="brand" onclick={confirmExistingSelection}></lightning-button>
                    </template>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
