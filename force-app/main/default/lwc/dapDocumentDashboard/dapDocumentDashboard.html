<template>
    <div>

    </div>
    <div>
        <lightning-accordion class="example-accordion" active-section-name="B">
            <template for:each={groupedData} for:item="year">
                <lightning-accordion-section name={year.year} label={year.year} key={year.year}>
                    <p>This is the content area for section A.</p>
                    <!-- <c-custom-datatable 
                        key-field="Id" 
                        columns={columns} 
                        data={year.docs}
                        hide-checkbox-column
                        sorted-direction={sortDirection}
                        sorted-by={sortBy}
                        onsort={doSorting}
                        onrowaction={handleIconClick}>
                    </c-custom-datatable> -->
                    <lightning-datatable
                        key-field="Id"
                        columns={columns}
                        data={year.docs}
                        hide-checkbox-column
                        sorted-direction={sortDirection}
                        sorted-by={sortBy}
                        onsort={doSorting}
                        onrowaction={handleIconClick}>
                    </lightning-datatable>
                    <!-- <lightning-datatable
                        key-field="id"
                        columns={columns}
                        data={year.docs}
                        hide-checkbox-column
                        sorted-direction={sortDirection}
                        sorted-by={sortBy}
                        onsort={doSorting}>
                    </lightning-datatable> -->
            </lightning-accordion-section>
            </template>
            
        </lightning-accordion>
    </div>

    <template if:true={isModalOpen}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">
                        Document Details
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form
                        record-id={selectedRecordId}
                        object-api-name="Document__c"
                        onsuccess={handleSuccess}
                        >
                        <lightning-messages> </lightning-messages>
                        <lightning-input-field field-name="Name"> </lightning-input-field>
                        <lightning-input-field field-name="ValidFromYear__c"> </lightning-input-field>
                        <lightning-input-field field-name="ValidToYear__c"> </lightning-input-field>
                        <lightning-button
                            class="slds-m-top_small"
                            variant="brand"
                            type="submit"
                            name="update"
                            label="Update"
                        >
                        </lightning-button>
                    </lightning-record-edit-form>
                    Record Id: {selectedRecordId}
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button 
                        label="Close"
                        onclick={closeModal}>
                    </lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

        
    </template>
</template>
