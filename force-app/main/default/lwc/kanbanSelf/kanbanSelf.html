<template>
    <div class="kanban-wrapper">
        <div class="main-header">
            <h2>KANBAN BOARD</h2>
        </div>

        <div class="kanban-container">
            <div class="kanban-column" data-stage="To Do" ondragover={handleDragOver} ondrop={handleDrop}>
                <div class="column-header">To Do</div>
                
                <div class="action-buttons">
                    <button class="btn" onclick={handleAddTask}>Add Tasks</button>
                    <button class="btn" onclick={handleReadyTask}>Ready</button>
                </div>

                <div class="task-list">
                    <template for:each={todoTasks} for:item="task">
                        <div key={task.id} class={task.cssClass} draggable={task.isDraggable} data-id={task.id} ondragstart={handleDragStart}>
                            <input type="checkbox" data-id={task.id} checked={task.selected} onchange={handleCheckboxChange} />
                            <span class="task-name">{task.name}</span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="kanban-column" data-stage="In Process" ondragover={handleDragOver} ondrop={handleDrop}>
                <div class="column-header">In Process</div>
                <div class="task-list">
                    <template for:each={inProcessTasks} for:item="task">
                        <div key={task.id} class={task.cssClass} draggable={task.isDraggable} data-id={task.id} ondragstart={handleDragStart}>
                            <span class="task-name">{task.name}</span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="kanban-column" data-stage="QA Sandbox" ondragover={handleDragOver} ondrop={handleDrop}>
                <div class="column-header">QA Sandbox</div>
                <div class="task-list">
                    <template for:each={qaTasks} for:item="task">
                        <div key={task.id} class={task.cssClass} draggable={task.isDraggable} data-id={task.id} ondragstart={handleDragStart}>
                            <span class="task-name">{task.name}</span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="kanban-column" data-stage="Production" ondragover={handleDragOver} ondrop={handleDrop}>
                <div class="column-header">Production</div>
                <div class="task-list">
                    <template for:each={prodTasks} for:item="task">
                        <div key={task.id} class={task.cssClass} draggable={task.isDraggable} data-id={task.id} ondragstart={handleDragStart}>
                            <span class="task-name">{task.name}</span>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Add New Task</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-input label="Task Name" value={newTaskName} onchange={handleInputChange}></lightning-input>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button variant="brand" label="Save" onclick={saveNewTask}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </div>
</template>
