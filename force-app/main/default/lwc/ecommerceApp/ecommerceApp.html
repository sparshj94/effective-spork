<template>
    <div class="slds-m-bottom_medium slds-text-heading_medium slds-p-around_small">
        <lightning-icon icon-name="utility:cart" size="small"></lightning-icon>
        Cart Items: {totalCartItems}
    </div>

    <div class="slds-grid slds-wrap">
        <template for:each={productData} for:item="product">
            <lightning-card title={product.Name} icon-name="standard:product" key={product.Id} class="slds-col slds-size_1-of-3 slds-p-around_small">
                <div class="slds-p-horizontal_small">
                    <img src={product.DisplayUrl} alt={product.Name} style="height:150px; object-fit:contain;"/>
                    <p>{product.Description}</p>
                    <p class="slds-m-top_small"><strong>Price: ${product.UnitPrice}</strong></p>
                    
                    <lightning-button 
                        variant="brand"
                        label="Add To Cart" 
                        data-product-id={product.Id}
                        data-product-name={product.Name}
                        data-product-price={product.UnitPrice} 
                        class="slds-m-top_small"
                        onclick={handleAddProduct} 
                    ></lightning-button>
                </div>
            </lightning-card>
        </template>
    </div>

    <div class="slds-m-top_large slds-p-around_small">
        <h1 class="slds-text-heading_large slds-m-bottom_medium">Shopping Cart</h1>

        <template if:true={cartArray.length}>
            <template for:each={cartArray} for:item="item">
                <lightning-card key={item.Id} class="slds-m-bottom_small">
                    <div class="slds-grid slds-grid_align-spread slds-p-around_small slds-align-middle">
                        <div><strong>{item.Name}</strong></div>
                        <div>Price: ${item.UnitPrice}</div>
                        
                        <div>
                            <lightning-button-icon icon-name="utility:minus" data-action="decrease" data-product-id={item.Id} onclick={handleQuantityUpdate}></lightning-button-icon>
                            <span class="slds-p-horizontal_medium">Qty: {item.Quantity}</span>
                            <lightning-button-icon icon-name="utility:plus" data-action="increase" data-product-id={item.Id} onclick={handleQuantityUpdate}></lightning-button-icon>
                        </div>
                        
                        <div>
                            <lightning-button variant="destructive" label="Remove" data-product-id={item.Id} onclick={removeItemCart}></lightning-button>
                        </div>
                    </div>
                </lightning-card>
            </template>

            <div class="slds-m-top_medium slds-text-heading_medium">
                <strong>Total Price: ${cartTotalPrice}</strong>
            </div>

            <div class="slds-m-top_medium">
                <lightning-button variant="success" label="Checkout" onclick={handleCheckout}></lightning-button>
            </div>
        </template>
        
        <template if:false={cartArray.length}>
            <p>Your cart is empty. Add some products!</p>
        </template>
    </div>
</template>
