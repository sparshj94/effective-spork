<template>
        <lightning-modal-header label='Delete contact record'>
            <p>Delete contact</p>
        </lightning-modal-header>
            <lightning-modal-body>
                <p>Are you Sure ?</p>
            </lightning-modal-body>
            <lightning-modal-footer>
                <lightning-button
                    class="slds-button"
                    variant="neutral"
                    label="Cancel"
                    onclick={handleDismiss}
                ></lightning-button>
                <lightning-button
                    class="slds-button slds-m-left_x-small"
                    variant="brand"
                    label="Delete"
                    onclick={handleDelete}
                ></lightning-button>
            </lightning-modal-footer>
    </template>
