<template>
    <lightning-card title="Opportunity Management">
        <div slot="actions">
            <lightning-button label="New" variant="brand" onclick={handleNewOpp} class="slds-m-right_x-small"></lightning-button>
            <lightning-button-icon icon-name="utility:refresh" onclick={loadData}></lightning-button-icon>
        </div>

        <lightning-tabset active-tab-value={activeTab}>
            <template for:each={tabs} for:item="tab">
                <lightning-tab key={tab.value} label={tab.label} value={tab.value} onactive={handleTabSwitch}>
                    <div style="height: 300px;">
                        <lightning-datatable 
                            key-field="Id"
                            data={filteredData}
                            columns={columns}
                            onsort={handleSort}
                            sorted-by={sortBy}
                            sorted-direction={sortDirection}
                            hide-checkbox-column>
                        </lightning-datatable>
                    </div>
                </lightning-tab>
            </template>
        </lightning-tabset>

        <template if:true={isNewModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">New Opportunity ({activeTabLabel})</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-record-edit-form object-api-name="Opportunity" onsuccess={handleSuccess}>
                            <lightning-messages></lightning-messages>
                            <lightning-input-field field-name="Name"></lightning-input-field>
                            <lightning-input-field field-name="AccountId"></lightning-input-field>
                            <lightning-input-field field-name={tabFieldName} value={defaultTabValue}></lightning-input-field>
                            <lightning-input-field field-name="CloseDate"></lightning-input-field>
                            
                            <div class="slds-m-top_medium slds-text-align_right">
                                <lightning-button label="Cancel" onclick={handleCancelBtn} class="slds-m-right_small"></lightning-button>
                                <lightning-button type="submit" variant="brand" label="Save"></lightning-button>
                            </div>
                        </lightning-record-edit-form>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
